{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <meta http-equiv="X-UA-Compatible" content="ie=edge">
   <title>My Blog</title>
   <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<header>
   <h1>
       <a href="{% url 'home' %}">My Personal Blog</a>
   </h1>
</header>

<div class="container">

   {% for article in object_list %}

       <div class="article">

           <h3>
               <a href="{% url 'article_detail' article.pk %}">
                   {{ article.title }}
               </a>
           </h3>

           <p>{{ article.body }}</p>

       </div>

   {% endfor %}

</div>

</body>
</html>
